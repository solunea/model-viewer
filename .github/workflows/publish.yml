name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: NPM install
      run: npm ci

    - name: Build packages
      run: npm run build

    - name: Publish @solunea/model-viewer
      run: npm publish --workspace=@solunea/model-viewer --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Publish @solunea/model-viewer-effects
      run: npm publish --workspace=@solunea/model-viewer-effects --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
